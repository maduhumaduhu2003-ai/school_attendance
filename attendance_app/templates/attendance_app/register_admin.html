<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Admin | {{ school_settings.school_name|default:"School Attendance System" }}</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
:root {
    --primary-color: #4f46e5;
    --primary-dark: #4338ca;
    --secondary-color: #10b981;
    --text-primary: #1f2937;
    --text-secondary: #6b7280;
}

body {
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    padding: 0;
}

.card-register {
    width: 100%;
    max-width: 420px;
    padding: 2.2rem;
    border-radius: 1rem;
    box-shadow: 0 12px 30px -8px rgba(0,0,0,0.15);
    background-color: #fff;
    animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

h3 {
    font-weight: 700;
    color: var(--text-primary);
    text-align: center;
    margin-bottom: 1.2rem;
}

.form-control {
    border-radius: 12px;
    padding: 0.75rem 1rem;
    font-size: 0.95rem;
    border: 1px solid #d1d5db;
    transition: all 0.3s ease;
}

.form-control::placeholder {
    color: #9ca3af;
}

.form-control:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
}

.btn-primary {
    background-color: var(--primary-color);
    border: none;
    border-radius: 12px;
    padding: 0.75rem;
    font-weight: 600;
    transition: all 0.3s ease;
}

.btn-primary:hover {
    background-color: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(79,70,229,0.25);
}

.text-muted {
    font-size: 0.8rem;
}

/* Global Loading Popup - Same as Register Student Admin (Styling Only, No AJAX) */
#globalLoading {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 9999;
    transition: opacity 0.4s ease;
    display: flex;
    justify-content: center;
    align-items: center;
}

.loading-card {
    background: white;
    padding: 1.5rem 2rem;
    border-radius: 1rem;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    min-width: 280px;
    max-width: 360px;
    border: 1px solid #dee2e6;
}

.loading-spinner {
    width: 2rem;
    height: 2rem;
    border: 3px solid #e5e7eb;
    border-top-color: #dc2626;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 0.75rem;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
    color: #1f2937;
}

.loading-text {
    font-size: 0.75rem;
    color: #6b7280;
    margin-bottom: 0;
}

.success-icon {
    color: #10b981;
    font-size: 2rem;
    margin-bottom: 0.5rem;
}

.error-icon {
    color: #ef4444;
    font-size: 2rem;
    margin-bottom: 0.5rem;
}

.d-none {
    display: none !important;
}

@media(max-width:480px) {
    .card-register {
        padding: 1.7rem;
        margin: 0 0.75rem;
    }

    .form-control {
        font-size: 0.9rem;
        padding: 0.65rem 0.9rem;
    }

    .btn-primary {
        font-size: 0.9rem;
        padding: 0.65rem;
    }
    
    .loading-card {
        padding: 1rem 1.5rem;
        min-width: 240px;
    }
}
</style>
</head>

<body>

<!-- Global Loading Popup  -->
<div id="globalLoading" class="d-none">
    <div class="loading-card">
        <div id="statusIcon" class="loading-spinner"></div>
        <h6 id="statusTitle" class="loading-title">registering...</h6>
        <p id="statusText" class="loading-text">please wait registering...</p>
    </div>
</div>

<div class="card-register">

    <h3>Register Admin</h3>

    <form method="post" id="registerForm" novalidate>
        {% csrf_token %}

        <div class="mb-3">
            <input type="text" name="first_name" class="form-control" placeholder="First Name" required>
        </div>

        <div class="mb-3">
            <input type="text" name="last_name" class="form-control" placeholder="Last Name" required>
        </div>

        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email (used as username)" required>
        </div>

        <div class="mb-3">
            <input type="tel" name="phone_number" class="form-control" placeholder="Phone Number (06 / 07)" required>
            <small class="text-muted">Accepted: 06XXXXXXXX or 07XXXXXXXX</small>
        </div>

        <div class="mb-3">
            <input type="password" name="password1" class="form-control" placeholder="Password" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password2" class="form-control" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="registerBtn">Register Admin</button>

        <div class="text-center mt-3">
            <a href="{% url 'login' %}" class="text-decoration-none text-primary fw-semibold" id="backToLoginBtn">
                Back to Login
            </a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // ================= LOADING POPUP CONTROLS  =================
    const loadingOverlay = document.getElementById('globalLoading');
    const statusIcon = document.getElementById('statusIcon');
    const statusTitle = document.getElementById('statusTitle');
    const statusText = document.getElementById('statusText');
    const registerForm = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');
    const backToLoginBtn = document.getElementById('backToLoginBtn');

    // Function to show loading spinner
    function showLoading() {
        if (loadingOverlay) {
            statusIcon.className = "loading-spinner";
            statusIcon.innerHTML = "";
            statusTitle.className = "loading-title";
            statusTitle.innerText = "registering...";
            statusText.innerText = "please wait registering...";
            loadingOverlay.classList.remove('d-none');
        }
    }

    // ================= BACK TO LOGIN BUTTON =================
    if (backToLoginBtn) {
        backToLoginBtn.addEventListener('click', function(e) {
            showLoading();
        });
    }

    // ================= FORM SUBMIT HANDLER (No AJAX - Just show loading) =================
    if (registerForm) {
        registerForm.addEventListener('submit', function() {
            // Show loading popup
            showLoading();
            
            // Disable button to prevent double submission
            if (registerBtn) {
                registerBtn.disabled = true;
                registerBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Inasajili...';
            }
            
            // Form will submit normally (page reload)
            return true;
        });
    }

    // ================= CHECK FOR DJANGO MESSAGES ON PAGE LOAD =================
    // If there are messages (success/error), show them in popup
    {% if messages %}
        setTimeout(function() {
            if (loadingOverlay) {
                let isSuccess = false;
                let messageText = "";
                {% for message in messages %}
                    messageText = "{{ message|escapejs }}";
                    {% if message.tags == 'success' %}
                        isSuccess = true;
                    {% endif %}
                {% endfor %}
                
                if (isSuccess) {
                    statusIcon.className = "success-icon";
                    statusIcon.innerHTML = '<i class="bi bi-check-circle-fill"></i>';
                    statusTitle.className = "loading-title text-success";
                    statusTitle.innerText = "success!";
                } else {
                    statusIcon.className = "error-icon";
                    statusIcon.innerHTML = '<i class="bi bi-x-circle-fill"></i>';
                    statusTitle.className = "loading-title text-danger";
                    statusTitle.innerText = "Error..try again!";
                }
                statusText.innerText = messageText;
                loadingOverlay.classList.remove('d-none');
                
                // Hide after 3 seconds
                setTimeout(function() {
                    loadingOverlay.classList.add('d-none');
                    // If success, redirect to login
                    if (isSuccess) {
                        window.location.href = "{% url 'login' %}";
                    }
                }, 3000);
            }
        }, 100);
    {% endif %}
});
</script>

</body>
</html>
