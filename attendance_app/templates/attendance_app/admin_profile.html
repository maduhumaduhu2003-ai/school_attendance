{% extends 'attendance_app/admin_base.html' %}
{% load static %}

{% block title %}My Profile{% endblock %}

{% block extra_css %}
<style>
.container { margin-top:30px; margin-bottom:30px; }
.card { max-width:700px; margin:0 auto; border-radius:10px; border:1px solid #e0e0e0; background:#fff; box-shadow:0 4px 8px rgba(0,0,0,0.05);}
.card .form-control { border-radius:6px; background:#f8f9fa; }
.card .form-control:focus { border-color:#4f46e5; box-shadow:0 0 5px rgba(79,70,229,0.3);}
.btn-primary { background:#4f46e5; border:none;}
.btn-primary:hover { background:#4338ca; }
.btn-warning { background:#f59e0b; border:none; color:#fff; }
.btn-warning:hover { background:#d97706; }
@media (max-width:767px) { .card { margin:0 0.5rem; box-shadow:none; border:1px solid #d1d5db;} .btn-primary, .btn-warning{width:100%;} }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4">
    <h3 class="mb-4 text-danger">My Profile</h3>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">

                <!-- TABS -->
                <ul class="nav nav-tabs mb-3" id="profileTab" role="tablist">
                  <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button" role="tab">Profile</button>
                  </li>
                  <li class="nav-item" role="presentation">
                    <button class="nav-link" id="password-tab" data-bs-toggle="tab" data-bs-target="#password" type="button" role="tab">Change Password</button>
                  </li>
                </ul>

                <div class="tab-content">
                    <!-- PROFILE TAB -->
                    <div class="tab-pane fade show active" id="profile" role="tabpanel">
                        <form method="POST">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" name="first_name" class="form-control form-control-sm" value="{{ request.user.first_name }}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" name="last_name" class="form-control form-control-sm" value="{{ request.user.last_name }}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control form-control-sm" value="{{ request.user.email }}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control form-control-sm" value="{{ request.user.username }}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="text" name="phone_number" class="form-control form-control-sm" value="{{ request.user.phone_number|default:'' }}">
                            </div>

                            <button type="submit" name="update_profile" class="btn btn-primary w-100">Update Profile</button>
                        </form>
                    </div>

                    <!-- PASSWORD TAB -->
                    <div class="tab-pane fade" id="password" role="tabpanel">
                        <form method="POST">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label">Old Password</label>
                                <input type="password" name="old_password" class="form-control form-control-sm" placeholder="Enter old password">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <input type="password" name="new_password1" class="form-control form-control-sm" placeholder="Enter new password">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Confirm New Password</label>
                                <input type="password" name="new_password2" class="form-control form-control-sm" placeholder="Confirm new password">
                            </div>

                            <button type="submit" name="change_password" class="btn btn-warning w-100">Change Password</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener("DOMContentLoaded", function() {
    {% if messages %}
        {% for message in messages %}
            {% if 'Password' in message.message %}
                var passwordTab = new bootstrap.Tab(document.getElementById('password-tab'));
                passwordTab.show();
            {% endif %}
        {% endfor %}
    {% endif %}
});
</script>
{% endblock %}
