{% extends "attendance_app/admin_base.html" %}
{% block title %}Register Student{% endblock %}

{% block content %}
<div class="container mt-5">
  <h2 class="mb-4">Register New Student</h2>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6"><label>First Name</label><input type="text" name="first_name" class="form-control" required></div>
      <div class="col-md-6"><label>Last Name</label><input type="text" name="last_name" class="form-control" required></div>
      <div class="col-md-6"><label>Admission Number</label><input type="text" name="admission_number" class="form-control" required></div>
      <div class="col-md-6"><label>Academic Year</label>
        <select name="academic_year" class="form-select" required>
          {% for year in academic_years %}
          <option value="{{ year.id }}" {% if active_year and year.id == active_year.id %}selected{% endif %}>
            {{ year.year_start }}/{{ year.year_end }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6"><label>Classroom</label>
        <select name="classroom" class="form-select" required>
          {% for classroom in classrooms %}
          <option value="{{ classroom.id }}">{{ classroom.name }} ({{ classroom.year }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6"><label>Stream</label>
        <select name="stream" class="form-select" required>
          {% for stream in streams %}
          <option value="{{ stream.id }}">{{ stream.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6"><label>Gender</label>
        <select name="gender" class="form-select" required>
          <option value="">Select Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
      <div class="col-md-6"><label>Parent Full Name</label><input type="text" name="parent_full_name" class="form-control" required></div>
      <div class="col-md-6"><label>Parent Phone</label><input type="text" name="parent_phone" class="form-control" required></div>
    </div>

    <button type="submit" class="btn btn-primary mt-3">Register Student</button>
  </form>
</div>
{% endblock %}
