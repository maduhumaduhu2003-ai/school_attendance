<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | {{ school_settings.school_name|default:"School Attendance System" }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
    :root {
        --primary-color: #4f46e5;
        --primary-dark: #4338ca;
        --card-color: rgba(255,255,255,0.85);
        --text-primary: #1f2937;
        --text-secondary: #6b7280;
        --border-color: #e5e7eb;
        --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1);
    }

    /* Reset & Background Sync */
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        background: #1e293b;
        position: relative;
        overflow: hidden;
    }

    body::before {
        content: "";
        position: fixed;
        top:0; left:0; width:100%; height:100%;
        background: url("{% if school_settings.logo %}{{ school_settings.logo.url }}{% else %}/static/images/logo.png{% endif %}") center center/cover no-repeat;
        z-index:-2;
        filter: brightness(0.25);
    }

    body::after {
        content:"";
        position: fixed;
        top:0; left:0; width:100%; height:100%;
        background: rgba(0,0,0,0.15);
        z-index:-1;
    }

    /* Animated bubbles */
    .bg-bubble-1, .bg-bubble-2, .bg-bubble-3 {
        position: fixed; border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        z-index: -1;
        animation: float 20s infinite ease-in-out;
    }
    .bg-bubble-1 { width: 300px; height: 300px; top:-150px; right:-150px; }
    .bg-bubble-2 { width: 200px; height: 200px; bottom:-100px; left:-100px; animation-delay:5s; }
    .bg-bubble-3 { width: 150px; height: 150px; top:50%; left:-75px; animation-delay:10s; }

    @keyframes float {
        0%,100% { transform: translateY(0) rotate(0deg); }
        33% { transform: translateY(-30px) rotate(120deg); }
        66% { transform: translateY(30px) rotate(240deg); }
    }

    /* Container & Card */
    .reset-container { width:100%; max-width:380px; padding: 0 15px; animation: slideUp 0.6s ease-out; }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .reset-card {
        background: var(--card-color);
        border-radius:20px;
        box-shadow: var(--shadow-lg);
        overflow:hidden;
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
    }

    /* Header */
    .card-header {
        padding: 1.5rem 1.5rem 1rem;
        text-align:center;
        background: rgba(255,255,255,0.7);
        border-bottom: 1px solid var(--border-color);
    }

    .icon-circle {
        width: 60px; height: 60px;
        background: rgba(79, 70, 229, 0.1);
        color: var(--primary-color);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 0.75rem;
        font-size: 1.5rem;
    }

    .title-text { color: var(--primary-color); font-size:1.4rem; font-weight:700; margin:0; }

    /* Body */
    .card-body { padding:1.25rem 1.5rem 1.5rem; }

    .subtitle {
        font-size: 0.85rem;
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 1.5rem;
    }

    .form-control {
        padding:0.75rem 1rem;
        border:2px solid var(--border-color);
        border-radius:10px;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .btn-primary {
        background-color: var(--primary-color);
        border: none;
        padding: 0.75rem;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        background-color: var(--primary-dark);
        transform: translateY(-1px);
    }

    /* Footer */
    .card-footer {
        padding:1rem;
        text-align:center;
        font-size:0.8rem;
        border-top: 1px solid var(--border-color);
    }
    
    .back-link {
        color: var(--text-secondary);
        text-decoration: none;
        transition: color 0.2s;
    }

    .back-link:hover { color: var(--primary-color); }
    </style>
</head>
<body>

<div class="bg-bubble-1"></div>
<div class="bg-bubble-2"></div>
<div class="bg-bubble-3"></div>

<div class="reset-container">
    <div class="reset-card">
        
        <div class="card-header">
            <div class="icon-circle">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h1 class="title-text">Set New Password</h1>
        </div>

        <div class="card-body">
            <p class="subtitle">Secure your account with a strong password.</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'danger' }} alert-dismissible fade show py-2 small" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="New Password" required>
                </div>

                <div class="mb-3">
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Reset Password
                </button>
            </form>
        </div>

        <div class="card-footer">
            <a href="{% url 'login' %}" class="back-link">
                <i class="bi bi-arrow-left pe-1"></i> Back to Login
            </a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
