{% extends "attendance_app/teacher_base.html" %}

{% load static %}

{% block title %}Teacher Profile{% endblock %}

{% block content %}

<!-- GLOBAL LOADING / SUCCESS OVERLAY -->
<div id="globalLoading" class="position-fixed top-0 start-0 w-100 h-100 {% if not profile_success and not password_success %}d-none{% endif %}" style="background: rgba(0, 0, 0, 0.3); z-index: 9999; transition: opacity 0.4s ease;">
    <div class="d-flex justify-content-center align-items-center h-100">
        <div class="bg-white p-4 rounded-3 shadow-lg text-center d-flex align-items-center gap-3" style="min-width: 240px; max-width: 320px; border: 1px solid #dee2e6;">
            
            {% if profile_success or password_success %}
                <!-- Hali ya Mafanikio (Success Tick) -->
                <div id="statusIcon" class="text-success d-flex align-items-center justify-content-center" style="flex-shrink: 0;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                      <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                    </svg>
                </div>
                <h6 id="statusText" class="mb-0 text-success fw-bold" style="white-space: nowrap;">successfull!</h6>
            {% else %}
                <!-- Hali ya Kupakia (Loading) -->
                <div id="statusIcon" class="spinner-border text-danger" role="status" style="width: 2rem; height: 2rem; flex-shrink: 0;"></div>
                <h6 id="statusText" class="mb-0 text-dark fw-bold" style="white-space: nowrap;">please wait...</h6>
            {% endif %}

        </div>
    </div>
</div>

<div class="container mt-4">

    <h3 class="mb-4">My Profile</h3>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">

                <!-- TABS -->
                <ul class="nav nav-tabs mb-3" id="profileTab" role="tablist">
                  <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button" role="tab">Profile</button>
                  </li>
                  <li class="nav-item" role="presentation">
                    <button class="nav-link" id="password-tab" data-bs-toggle="tab" data-bs-target="#password" type="button" role="tab">Change Password</button>
                  </li>
                </ul>

                <!-- TAB CONTENT -->
                <div class="tab-content">
                    <!-- PROFILE TAB -->
                    <div class="tab-pane fade show active" id="profile" role="tabpanel">
                        <form method="POST" enctype="multipart/form-data" class="profile-form">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="first_name" class="form-label">First Name</label>
                                <input type="text" name="first_name" id="first_name" class="form-control form-control-sm" value="{{ request.user.first_name }}">
                            </div>

                            <div class="mb-3">
                                <label for="last_name" class="form-label">Last Name</label>
                                <input type="text" name="last_name" id="last_name" class="form-control form-control-sm" value="{{ request.user.last_name }}">
                            </div>

                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" name="username" id="username" class="form-control form-control-sm" value="{{ request.user.username }}">
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" name="email" id="email" class="form-control form-control-sm" value="{{ request.user.email }}">
                            </div>

                            <div class="mb-3">
                                <label for="phone_number" class="form-label">Phone Number</label>
                                <input type="text" name="phone_number" id="phone_number" class="form-control form-control-sm" value="{{ teacher.phone_number }}">
                            </div>

                            <button type="submit" name="update_profile" class="btn btn-primary w-100 btn-submit">
                                Update Profile
                            </button>
                        </form>
                    </div>

                    <!-- PASSWORD TAB -->
                    <div class="tab-pane fade" id="password" role="tabpanel">
                        <form method="POST" class="profile-form">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="old_password" class="form-label">Old Password</label>
                                <input type="password" name="old_password" id="old_password" class="form-control form-control-sm">
                            </div>
                            <div class="mb-3">
                                <label for="new_password1" class="form-label">New Password</label>
                                <input type="password" name="new_password1" id="new_password1" class="form-control form-control-sm">
                            </div>
                            <div class="mb-3">
                                <label for="new_password2" class="form-label">Confirm New Password</label>
                                <input type="password" name="new_password2" id="new_password2" class="form-control form-control-sm">
                            </div>

                            <button type="submit" name="change_password" class="btn btn-warning w-100 btn-submit">
                                Change Password
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</div>

<style>
.card { border-radius: 12px; }
.card .form-control { border-radius: 6px; }
.btn-primary { background-color: #4f46e5; border: none; }
.btn-primary:hover { background-color: #4338ca; }
.btn-warning { background-color: #f59e0b; border: none; color: #fff; }
.btn-warning:hover { background-color: #d97706; }
img.rounded-circle { object-fit: cover; }
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const loadingOverlay = document.getElementById('globalLoading');
    const profileForms = document.querySelectorAll('.profile-form');

    // 1. Unapobonyeza submit, onyesha popup ikiwa kwenye hali ya loading (Tafadhali subiri...)
    profileForms.forEach(form => {
        form.addEventListener('submit', function() {
            if (loadingOverlay) {
                // Kama ukurasa ulikuwa na success ya nyuma, isafishe kwanza kurudisha loading ya sasa
                const statusIcon = document.getElementById('statusIcon');
                const statusText = document.getElementById('statusText');
                
                if (statusIcon && statusText) {
                    statusIcon.className = "spinner-border text-danger";
                    statusIcon.innerHTML = "";
                    statusText.className = "mb-0 text-dark fw-bold";
                    statusText.innerText = "please wait...";
                }
                loadingOverlay.classList.remove('d-none');
            }
        });
    });

    // 2. Kama ukurasa umefunguka ukiwa tayari una 'success tick', ifiche popup kiotomatiki baada ya sekunde 2.5
    {% if profile_success or password_success %}
        if (loadingOverlay) {
            setTimeout(function() {
                loadingOverlay.style.opacity = '0';
                setTimeout(function() {
                    loadingOverlay.classList.add('d-none');
                    loadingOverlay.style.opacity = '1'; // Inarudisha opacity tayari kwa ajili ya submit ijayo
                }, 400); // Muda wa fade-out
            }, 2500); // Muda ambao tick ya mafanikio itabaki skrini kabla ya kupotea
        }
    {% endif %}

    // 3. AUTO SWITCH TAB IF MESSAGE COMES FROM PASSWORD CHANGE
    {% if password_success %}
        var passwordTab = new bootstrap.Tab(document.getElementById('password-tab'));
        passwordTab.show();
    {% endif %}
});
</script>
{% endblock %}
