{% extends "attendance_app/admin_base.html" %}
{% block title %}Edit Student{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-primary">Edit Student</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- Student Info -->
        <div class="mb-3">
            <label>First Name</label>
            <input type="text" name="first_name" value="{{ student.user.first_name }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Last Name</label>
            <input type="text" name="last_name" value="{{ student.user.last_name }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Gender</label>
            <select name="gender" class="form-select" required>
                <option value="male" {% if student.user.gender == 'male' %}selected{% endif %}>Male</option>
                <option value="female" {% if student.user.gender == 'female' %}selected{% endif %}>Female</option>
            </select>
        </div>

        <!-- CLASS -->
        <div class="mb-3">
            <label>Class</label>
            <select name="classroom" id="classroomSelect" class="form-select">
                <option value="">Select Class</option>
                {% for c in classrooms %}
                <option value="{{ c.id }}" {% if student.classroom and student.classroom.id == c.id %}selected{% endif %}>
                    {{ c.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- STREAM -->
        <div class="mb-3">
            <label>Stream</label>
            <select name="stream" id="streamSelect" class="form-select">
                <option value="">Select Stream</option>
            </select>
        </div>

        <!-- Parent -->
        <h4 class="mt-4 text-primary">Parent Details</h4>

        <div class="mb-3">
            <label>Parent Full Name</label>
            <input type="text" name="parent_full_name" value="{{ parent.user.get_full_name }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Parent Phone</label>
            <input type="text" name="parent_phone" value="{{ parent.user.phone_number }}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'manage_student' %}" class="btn btn-secondary">Cancel</a>

    </form>
</div>

<!-- SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function(){

    const classroom = document.getElementById("classroomSelect");
    const stream = document.getElementById("streamSelect");

    function loadStreams(classId, selectedStream=null){

        if(!classId){
            stream.innerHTML = '<option value="">Select Stream</option>';
            return;
        }

        stream.innerHTML = '<option>Loading...</option>';

        fetch(`/get-streams/${classId}/`)
        .then(res => res.json())
        .then(data => {

            stream.innerHTML = '<option value="">Select Stream</option>';

            data.streams.forEach(s => {
                let selected = (selectedStream == s.id) ? "selected" : "";
                stream.innerHTML += `<option value="${s.id}" ${selected}>${s.name}</option>`;
            });

        })
        .catch(() => {
            stream.innerHTML = '<option>Error loading streams</option>';
        });
    }

    // ON CHANGE CLASS
    classroom.addEventListener("change", function(){
        loadStreams(this.value);
    });

    // 🔥 LOAD CURRENT STUDENT DATA
    const selectedClass = "{{ student.classroom.id|default:'' }}";
    const selectedStream = "{{ student.stream.id|default:'' }}";

    if(selectedClass){
        loadStreams(selectedClass, selectedStream);
    }

});
</script>

{% endblock %}
